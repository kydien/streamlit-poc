name: Continue Config
version: 0.0.1
models:
  - name: Gemini 1.5 Flash (Worker)
    provider: gemini
    model: gemini-2.5-flash
    apiKey: AIzaSyCJPJxAG5q8xqSDmrgjD8n1t7pmuH2cJ-I
    roles:
      - chat
  - name: Gemini 1.5 Pro (Architekt)
    provider: gemini
    model: gemini-2.5-pro
    apiKey: AIzaSyCJPJxAG5q8xqSDmrgjD8n1t7pmuH2cJ-I
    roles:
      - chat

prompts:
  - name: "skeleton"
    description: "Erstellt Code strikt nach UML-Pfadvorgabe"
    prompt: "Nutze @ARCHITECTURE.mmd.
      1. Identifiziere den Zielpfad aus den Notes im MMD.
      2. Erstelle/Aktualisiere die .py Datei in diesem spezifischen Ordner.
      3. Implementiere [AUFGABE] als Klasse/Funktion mit Typ-Anmerkungen.
      Falls der Ordner nicht existiert, nenne mir den 'mkdir' Befehl zuerst."

context:
  - uses: continuedev/codebase-context
    with: {}
  - uses: continuedev/tree-context
    with: {}
  - uses: continuedev/open-files-context
    with: {}
  - uses: continuedev/diff-context
    with: {}
